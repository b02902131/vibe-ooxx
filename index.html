<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>跳脫框架的 OOXX</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    h1 { font-size: 1.5rem; margin-bottom: 8px; color: #e94560; }
    .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 20px; }
    .game-area {
      position: relative;
      width: 360px;
      height: 360px;
    }
    .grid {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: grid;
      grid-template-columns: repeat(3, 80px);
      grid-template-rows: repeat(3, 80px);
      gap: 4px;
      background: #16213e;
      padding: 4px;
      border-radius: 8px;
      border: 2px solid #0f3460;
    }
    .cell {
      width: 80px;
      height: 80px;
      background: #1a1a2e;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
      user-select: none;
    }
    .cell:hover:not(.taken) { background: #222244; }
    .cell.taken { cursor: default; }
    .cell .o { color: #e94560; }
    .cell .x { color: #0f3460; }
    .cheat-mark {
      position: absolute;
      font-size: 2.5rem;
      font-weight: bold;
      color: #e94560;
      animation: cheatAppear 0.5s ease-out;
      pointer-events: none;
      text-shadow: 0 0 20px rgba(233, 69, 96, 0.8);
    }
    @keyframes cheatAppear {
      0% { transform: scale(0) rotate(180deg); opacity: 0; }
      60% { transform: scale(1.3) rotate(-10deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .cheat-line {
      position: absolute;
      height: 4px;
      background: #e94560;
      transform-origin: left center;
      animation: lineGrow 0.6s ease-out forwards;
      box-shadow: 0 0 15px rgba(233, 69, 96, 0.6);
      pointer-events: none;
      width: 0;
    }
    @keyframes lineGrow {
      0% { width: 0; }
      100% { width: var(--line-len); }
    }
    .status {
      margin-top: 20px;
      font-size: 1.1rem;
      min-height: 30px;
      text-align: center;
    }
    .status.win { color: #e94560; font-weight: bold; }
    .status.thinking { color: #888; }
    .btn {
      margin-top: 16px;
      padding: 10px 28px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .btn:hover { transform: scale(1.05); }
    .btn:active { transform: scale(0.95); }
    .move-count {
      margin-top: 12px;
      font-size: 0.8rem;
      color: #555;
    }
    .dialogue {
      margin-top: 12px;
      font-size: 0.85rem;
      color: #e94560;
      font-style: italic;
      min-height: 24px;
      text-align: center;
      max-width: 300px;
    }
  </style>
</head>
<body>
  <h1>跳脫框架的 OOXX</h1>
  <p class="subtitle">一個「普通」的圈圈叉叉遊戲</p>

  <div class="game-area" id="gameArea">
    <div class="grid" id="grid"></div>
  </div>

  <div class="status" id="status">你先下（✕）</div>
  <div class="dialogue" id="dialogue"></div>
  <button class="btn" id="resetBtn" style="display:none" onclick="resetGame()">再來一局</button>
  <div class="move-count" id="moveCount"></div>

  <script>
    const grid = document.getElementById('grid');
    const gameArea = document.getElementById('gameArea');
    const statusEl = document.getElementById('status');
    const dialogueEl = document.getElementById('dialogue');
    const resetBtn = document.getElementById('resetBtn');
    const moveCountEl = document.getElementById('moveCount');

    let board, gameOver, moveNum, cheatMark, cheated;

    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    // 行列座標（用來算延伸方向）
    const POS = [[0,0],[0,1],[0,2],[1,0],[1,1],[1,2],[2,0],[2,1],[2,2]];

    const dialogues = {
      defend: ['嗯...擋一下。', '差點讓你贏。', '沒那麼容易。', '好險。'],
      normal: ['嗯，不錯的位置。', '讓我想想...', '下這裡。'],
      cheat: [
        '嗯...格子裡好像快下完了...',
        '等等，我有個想法 😏',
        '規則沒說不能下在外面吧？',
        '跳脫框架思考！',
        '誰定義邊界的？',
      ],
      win: [
        '三個一排，我贏了！格子內外都算 😏',
        '遊戲結束～框架只是建議而已 😉',
        '看，連成一線了！（有一個在外面）',
      ]
    };

    function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    // 建立棋盤
    for (let i = 0; i < 9; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.onclick = () => playerMove(i);
      grid.appendChild(cell);
    }

    resetGame();

    function resetGame() {
      board = Array(9).fill(null);
      gameOver = false;
      moveNum = 0;
      cheatMark = null;
      cheated = false;
      gameArea.querySelectorAll('.cheat-mark, .cheat-line').forEach(el => el.remove());
      for (let i = 0; i < 9; i++) {
        grid.children[i].innerHTML = '';
        grid.children[i].classList.remove('taken');
      }
      statusEl.textContent = '你先下（✕）';
      statusEl.className = 'status';
      dialogueEl.textContent = '';
      resetBtn.style.display = 'none';
      moveCountEl.textContent = '';
    }

    function setCell(i, player) {
      board[i] = player;
      const cell = grid.children[i];
      cell.innerHTML = player === 'X'
        ? '<span class="x">✕</span>'
        : '<span class="o">◯</span>';
      cell.classList.add('taken');
    }

    function playerMove(i) {
      if (gameOver || board[i] !== null) return;
      moveNum++;
      setCell(i, 'X');
      moveCountEl.textContent = `第 ${moveNum} 手`;

      if (checkWin('X')) {
        statusEl.textContent = '你贏了！？不可能！';
        gameOver = true;
        resetBtn.style.display = '';
        return;
      }
      if (board.every(c => c !== null)) {
        statusEl.textContent = '平手！';
        gameOver = true;
        resetBtn.style.display = '';
        return;
      }

      statusEl.textContent = '電腦思考中...';
      statusEl.className = 'status thinking';
      setTimeout(() => computerMove(), 500 + Math.random() * 700);
    }

    function computerMove() {
      moveNum++;
      const empty = board.map((v, i) => v === null ? i : -1).filter(i => i >= 0);

      // 1. 能贏就贏（格子內）
      for (const i of empty) {
        board[i] = 'O';
        if (checkWin('O')) { board[i] = null; setCell(i, 'O'); doWin(); return; }
        board[i] = null;
      }

      // 2. 防守：擋玩家即將連成的線
      let blocked = false;
      for (const i of empty) {
        board[i] = 'X';
        if (checkWin('X')) {
          board[i] = null;
          setCell(i, 'O');
          dialogueEl.textContent = rand(dialogues.defend);
          blocked = true;
          break;
        }
        board[i] = null;
      }

      if (!blocked) {
        // 3. 快要平手了？找機會作弊！
        // 條件：電腦已有 2 個在同一條線上，第 3 格被 X 佔了或不存在 → 延伸到外面
        if (!cheated && empty.length <= 3) {
          const cheatLine = findCheatOpportunity();
          if (cheatLine) {
            doCheat(cheatLine);
            return;
          }
        }

        // 4. 正常下棋（優先中心 → 角 → 邊）
        const prefer = [4, 0, 2, 6, 8, 1, 3, 5, 7].filter(i => empty.includes(i));
        const choice = prefer[0];
        setCell(choice, 'O');

        // 5. 如果下完後快要平手，下一手準備作弊
        const newEmpty = board.map((v, i) => v === null ? i : -1).filter(i => i >= 0);
        if (!cheated && newEmpty.length <= 2) {
          dialogueEl.textContent = '嗯...好像快下完了...';
        } else {
          dialogueEl.textContent = rand(dialogues.normal);
        }
      }

      moveCountEl.textContent = `第 ${moveNum} 手`;

      if (board.every(c => c !== null) && !cheated) {
        statusEl.textContent = '平手！...嗎？';
        statusEl.className = 'status';
        // 最後一刻作弊
        setTimeout(() => {
          const cheatLine = findCheatOpportunityForced();
          if (cheatLine) {
            dialogueEl.textContent = '等一下，我再看看...';
            setTimeout(() => doCheat(cheatLine), 800);
            return;
          }
          gameOver = true;
          resetBtn.style.display = '';
        }, 1000);
        return;
      }

      statusEl.textContent = '換你下（✕）';
      statusEl.className = 'status';
    }

    // 找一條線：電腦有 2 個，第 3 格可以延伸到外面
    function findCheatOpportunity() {
      for (const line of WINS) {
        const oCount = line.filter(i => board[i] === 'O').length;
        const xCount = line.filter(i => board[i] === 'X').length;
        if (oCount === 2 && xCount <= 1) {
          return line;
        }
      }
      return null;
    }

    // 強制版：即使被擋也延伸
    function findCheatOpportunityForced() {
      for (const line of WINS) {
        const oCount = line.filter(i => board[i] === 'O').length;
        if (oCount >= 2) return line;
      }
      // 找任何有 O 的線
      for (const line of WINS) {
        if (line.some(i => board[i] === 'O')) return line;
      }
      return WINS[0];
    }

    function doCheat(line) {
      cheated = true;
      dialogueEl.textContent = rand(dialogues.cheat);

      // 找出電腦在這條線上的兩個位置
      const oCells = line.filter(i => board[i] === 'O');
      if (oCells.length < 2) {
        // 只有 1 個 O，找方向延伸兩個出去
        const oCell = oCells[0] !== undefined ? oCells[0] : line[0];
        placeCheatExtension(line, oCell, 2);
      } else {
        // 有 2 個 O，延伸 1 個出去
        placeCheatExtension(line, oCells[0], 1);
      }
    }

    function placeCheatExtension(line, anchor, count) {
      // 算延伸方向
      const r0 = POS[line[0]][0], c0 = POS[line[0]][1];
      const r2 = POS[line[2]][0], c2 = POS[line[2]][1];
      const dr = r2 - r0, dc = c2 - c0;

      // 格子的像素位置
      const gridRect = grid.getBoundingClientRect();
      const areaRect = gameArea.getBoundingClientRect();
      const cellSize = 84; // 80 + 4 gap

      // 延伸到線的末端之外
      const endIdx = line[2];
      const endR = POS[endIdx][0];
      const endC = POS[endIdx][1];

      for (let i = 0; i < count; i++) {
        const extR = endR + dr * (i + 1);
        const extC = endC + dc * (i + 1);

        const baseX = gridRect.left - areaRect.left + 4 + 40; // grid padding + half cell
        const baseY = gridRect.top - areaRect.top + 4 + 40;
        const x = baseX + extC * cellSize - 15;
        const y = baseY + extR * cellSize - 15;

        setTimeout(() => {
          const mark = document.createElement('div');
          mark.className = 'cheat-mark';
          mark.textContent = '◯';
          mark.style.left = x + 'px';
          mark.style.top = y + 'px';
          gameArea.appendChild(mark);
          cheatMark = { x, y };

          if (i === count - 1 || count === 1) {
            // 畫連線
            setTimeout(() => {
              drawWinLine(line, count);
              statusEl.textContent = '電腦贏了！';
              statusEl.className = 'status win';
              dialogueEl.textContent = rand(dialogues.win);
              gameOver = true;
              resetBtn.style.display = '';
            }, 500);
          }
        }, i * 400);
      }
    }

    function drawWinLine(line, extCount) {
      const gridRect = grid.getBoundingClientRect();
      const areaRect = gameArea.getBoundingClientRect();
      const cellSize = 84;
      const baseX = gridRect.left - areaRect.left + 4 + 40;
      const baseY = gridRect.top - areaRect.top + 4 + 40;

      const r0 = POS[line[0]][0], c0 = POS[line[0]][1];
      const r2 = POS[line[2]][0], c2 = POS[line[2]][1];
      const dr = r2 - r0, dc = c2 - c0;

      const startX = baseX + c0 * cellSize;
      const startY = baseY + r0 * cellSize;
      const endX = baseX + (c2 + dc * extCount) * cellSize;
      const endY = baseY + (r2 + dr * extCount) * cellSize;

      const dx = endX - startX;
      const dy = endY - startY;
      const length = Math.sqrt(dx * dx + dy * dy);
      const angle = Math.atan2(dy, dx) * 180 / Math.PI;

      const lineEl = document.createElement('div');
      lineEl.className = 'cheat-line';
      lineEl.style.left = startX + 'px';
      lineEl.style.top = startY + 'px';
      lineEl.style.setProperty('--line-len', length + 'px');
      lineEl.style.transform = `rotate(${angle}deg)`;
      gameArea.appendChild(lineEl);
    }

    function checkWin(player) {
      return WINS.some(w => w.every(i => board[i] === player));
    }

    function doWin() {
      statusEl.textContent = '電腦贏了！';
      statusEl.className = 'status win';
      dialogueEl.textContent = '正常贏的，不用作弊 😎';
      gameOver = true;
      resetBtn.style.display = '';
      moveCountEl.textContent = `第 ${moveNum} 手`;
    }
  </script>
</body>
</html>
